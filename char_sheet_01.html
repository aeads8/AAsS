<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew's Asynchronous System (AAsS) Character Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
        }
        .container {
            max-width: 550px;
        }
        /* Hide spin buttons */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        .attr-input {
            margin: 0;
            text-align: center;
            background: transparent;
            border: none;
            width: 100%;
            color: white;
            font-weight: bold;
        }
        /* Custom Stepper Button Styles */
        .stepper-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background-color: #4b5563; /* gray-600 */
            color: white;
            font-weight: bold;
            border-radius: 4px;
            border: 2px solid #9ca3af; /* gray-400 */
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }
        .stepper-btn:hover {
            background-color: #374151; /* gray-700 */
            border-color: #ffffff; /* pure white on hover */
            transform: scale(1.05);
        }
        .stepper-btn:active {
            transform: scale(0.95);
        }
        .section-header {
            font-size: 0.875rem; /* text-sm */
            font-weight: 700; /* font-bold */
            color: #a5b4fc; /* text-indigo-300 */
            text-transform: uppercase;
            letter-spacing: 0.1em; /* tracking-widest */
        }

        /* Specific Grid Layout for Active Items Second Line */
        .item-controls-grid {
            display: grid;
            grid-template-columns: 30% 30% 30% 10%;
            align-items: center;
            gap: 0.5rem;
        }

        /* Force centering in select elements */
        .centered-select {
            text-align: center;
            text-align-last: center;
            -moz-appearance: none;
            -webkit-appearance: none;
            appearance: none;
            padding-right: 0 !important; /* Remove standard arrow padding to truly center */
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen text-gray-200">

<div class="container bg-gray-800 p-6 sm:p-8 rounded-xl shadow-2xl w-full border border-gray-700">
    
    <h1 class="text-3xl font-bold text-indigo-400 mb-6 text-center tracking-tight">AAsS Character Sheet</h1>

    <!-- Character Information -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <div class="space-y-3">
            <div class="flex items-center justify-between gap-4">
                <label for="charName" class="text-gray-400 font-bold uppercase text-[10px] tracking-widest w-1/4">Name</label>
                <input type="text" id="charName" class="w-3/4 px-3 py-2 bg-gray-900 border border-gray-500 rounded text-white focus:ring-2 focus:ring-indigo-500 outline-none" oninput="saveCharInfo()">
            </div>
            <div class="flex items-center justify-between gap-4">
                <label class="text-gray-400 font-bold uppercase text-[10px] tracking-widest w-1/4">Level</label>
                <div class="w-3/4 flex items-center justify-between bg-gray-900 border border-gray-500 rounded-lg p-1">
                    <button onclick="stepValue('charLevel', -1, 1, 20, saveCharInfo)" class="stepper-btn">－</button>
                    <input type="number" id="charLevel" value="1" readonly class="attr-input text-lg">
                    <button onclick="stepValue('charLevel', 1, 1, 20, saveCharInfo)" class="stepper-btn">＋</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Power & Harm -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600 text-center">
            <h2 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Power</h2>
            <div class="flex items-center justify-between bg-gray-900 border border-gray-600 rounded-lg p-1.5">
                <button onclick="stepValue('powerPoints', -1, 0, 10, savePower)" class="stepper-btn">－</button>
                <input type="number" id="powerPoints" value="0" readonly class="attr-input text-xl">
                <button onclick="stepValue('powerPoints', 1, 0, 10, savePower)" class="stepper-btn">＋</button>
            </div>
        </div>
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600 text-center">
            <h2 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Harm</h2>
            <div class="flex items-center justify-between bg-gray-900 border border-gray-600 rounded-lg p-1.5">
                <button onclick="stepValue('damagePoints', -1, 0, 6, handleDamagePointsChange)" class="stepper-btn">－</button>
                <input type="number" id="damagePoints" value="0" readonly class="attr-input text-xl">
                <button onclick="stepValue('damagePoints', 1, 0, 6, handleDamagePointsChange)" class="stepper-btn">＋</button>
            </div>
            <p id="conditionText" class="text-center text-[10px] mt-2 font-black uppercase tracking-widest text-green-400">Healthy</p>
        </div>
    </div>

    <!-- Abilities Section -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <h2 class="section-header mb-4">Abilities</h2>
        <div id="attributeInputs" class="space-y-4"></div>
    </div>

    <!-- Active Items -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <div class="flex justify-between items-center mb-3">
            <h2 class="section-header">Active Items</h2>
            <button onclick="addItemRow()" class="text-[10px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded tracking-widest uppercase font-bold transition">Add Item</button>
        </div>
        <div id="activeItemsContainer" class="space-y-4"></div>
    </div>
    
    <!-- Results Display -->
    <div id="results" class="mb-6 p-5 bg-gray-900 rounded-xl border-2 border-indigo-500 hidden animate-pulse-once">
        <div class="text-center mb-2">
            <span id="checkAttributeName" class="text-indigo-400 font-extrabold text-lg uppercase tracking-tighter"></span>
        </div>
        <div class="flex justify-around items-center mb-4">
            <div class="text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Mod</p>
                <div id="totalBonusDisplay" class="text-lg font-bold text-indigo-300"></div>
            </div>
            <div class="text-center">
                <div id="finalTotal" class="text-5xl font-black text-white"></div>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Dice</p>
                <div id="diceValues" class="text-lg font-mono text-yellow-400 font-bold"></div>
            </div>
        </div>
        <div id="outcomeText" class="text-xl font-bold rounded px-2 py-1 text-center"></div>
        <p id="outcomeEffect" class="text-xs text-gray-400 mt-2 text-center italic"></p>
    </div>

    <!-- Notes & Equipment -->
    <div class="space-y-4">
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
            <h2 class="section-header mb-2">General Equipment</h2>
            <textarea id="equipmentArea" rows="2" class="w-full px-3 py-2 bg-gray-900 border border-gray-500 rounded text-sm text-white focus:ring-1 focus:ring-indigo-500 outline-none" oninput="saveEquipment()"></textarea>
        </div>
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
            <h2 class="section-header mb-2">Notes</h2>
            <textarea id="notesArea" rows="2" class="w-full px-3 py-2 bg-gray-900 border border-gray-500 rounded text-sm text-white focus:ring-1 focus:ring-indigo-500 outline-none" oninput="saveNotes()"></textarea>
        </div>
    </div>
</div>

<script>
    const ATTRIBUTES = ['Strength', 'Dexterity', 'Wit', 'Soul'];
    const STORAGE_PREFIX = 'AASS_v9_';

    function saveData(key, val) { localStorage.setItem(STORAGE_PREFIX + key, typeof val === 'string' ? val : JSON.stringify(val)); }
    function getData(key, fallback) { 
        const v = localStorage.getItem(STORAGE_PREFIX + key);
        if (v === null) return fallback;
        try { return JSON.parse(v); } catch(e) { return v; }
    }

    function stepValue(id, change, min, max, callback) {
        const input = document.getElementById(id);
        let val = parseInt(input.value) || 0;
        val += change;
        if (val < min) val = min;
        if (val > max) val = max;
        input.value = val;
        if (callback) callback();
    }

    function saveCharInfo() {
        saveData('name', document.getElementById('charName').value);
        saveData('level', document.getElementById('charLevel').value);
    }
    function saveNotes() { saveData('notes', document.getElementById('notesArea').value); }
    function saveEquipment() { saveData('equipment', document.getElementById('equipmentArea').value); }
    function savePower() { saveData('power', document.getElementById('powerPoints').value); }

    function calculateHarmStatus(dp) {
        if (dp >= 6) return { status: 'Broken', penalty: -99, color: 'text-red-500' };
        if (dp >= 4) return { status: 'Injured', penalty: -2, color: 'text-red-400' };
        if (dp >= 2) return { status: 'Bruised', penalty: -1, color: 'text-orange-400' };
        return { status: 'Healthy', penalty: 0, color: 'text-green-400' };
    }

    function handleDamagePointsChange() {
        const dp = parseInt(document.getElementById('damagePoints').value) || 0;
        const { status, penalty, color } = calculateHarmStatus(dp);
        const el = document.getElementById('conditionText');
        el.textContent = status + (penalty !== -99 && penalty !== 0 ? ` (${penalty})` : '');
        el.className = `text-center text-[10px] mt-2 font-black uppercase tracking-widest ${color}`;
        
        document.querySelectorAll('.roll-btn').forEach(btn => {
            btn.disabled = (penalty === -99);
            btn.style.opacity = (penalty === -99) ? '0.3' : '1';
        });
        saveData('dp', dp);
    }

    function setupAttributeInputs() {
        const container = document.getElementById('attributeInputs');
        const stored = getData('bonuses', {});
        ATTRIBUTES.forEach(attr => {
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2 w-full';
            div.innerHTML = `
                <div class="w-24">
                    <span class="text-gray-300 text-[10px] sm:text-xs font-bold uppercase block tracking-widest">${attr}</span>
                </div>
                <div class="flex-1 flex gap-2">
                    <div class="w-1/2 flex items-center justify-between bg-gray-900 border border-gray-600 rounded-lg p-1">
                        <button onclick="stepValue('${attr}Bonus', -1, 0, 3, saveBonuses)" class="stepper-btn">－</button>
                        <input type="number" id="${attr}Bonus" value="${stored[attr] || 0}" readonly class="attr-input text-sm">
                        <button onclick="stepValue('${attr}Bonus', 1, 0, 3, saveBonuses)" class="stepper-btn">＋</button>
                    </div>
                    <div class="w-1/2">
                        <button onclick="rollCheck('${attr}')" class="roll-btn w-full h-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-2 rounded shadow transition text-[10px] uppercase tracking-widest border border-indigo-400">Roll</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function saveBonuses() {
        const bonuses = {};
        ATTRIBUTES.forEach(attr => bonuses[attr] = parseInt(document.getElementById(`${attr}Bonus`).value) || 0);
        saveData('bonuses', bonuses);
    }

    function addItemRow(data = { name: '', mod: 0, attr: 'Strength' }) {
        const id = Date.now() + Math.random();
        const container = document.getElementById('activeItemsContainer');
        const div = document.createElement('div');
        div.className = 'bg-gray-800 p-3 rounded-lg border border-gray-600 item-row space-y-3';
        div.dataset.id = id;
        
        let attrOptions = ATTRIBUTES.map(a => {
            let label = a.substring(0, 3).toUpperCase();
            if (a === 'Soul') label = 'SOUL';
            return `<option value="${a}" ${data.attr === a ? 'selected' : ''}>${label}</option>`;
        }).join('');
        
        let modOptions = '';
        for(let i=5; i>=-5; i--) modOptions += `<option value="${i}" ${data.mod == i ? 'selected' : ''}>${i > 0 ? '+' : ''}${i}</option>`;

        div.innerHTML = `
            <div class="flex items-center">
                <input type="text" placeholder="Item/Weapon Name..." value="${data.name}" class="item-name w-full bg-gray-900 border border-gray-500 rounded px-3 py-2 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none" oninput="saveItems()">
            </div>
            
            <div class="item-controls-grid">
                <!-- Mod (30%) - Centered Numbers -->
                <div class="flex flex-col gap-1">
                    <span class="text-[8px] uppercase font-bold text-gray-500 text-center tracking-tighter">Mod</span>
                    <select class="item-mod centered-select bg-gray-700 border border-gray-500 rounded px-1 py-1 text-white text-xs font-bold w-full appearance-none" onchange="saveItems()">
                        ${modOptions}
                    </select>
                </div>
                
                <!-- Ability (30%) - Centered Text -->
                <div class="flex flex-col gap-1">
                    <span class="text-[8px] uppercase font-bold text-gray-500 text-center tracking-tighter">Ability</span>
                    <select class="item-attr centered-select bg-gray-700 border border-gray-500 rounded px-1 py-1 text-white text-[10px] uppercase font-bold w-full appearance-none" onchange="saveItems()">
                        ${attrOptions}
                    </select>
                </div>
                
                <!-- Roll (30%) -->
                <div class="flex flex-col gap-1">
                    <span class="opacity-0 text-[8px]">Roll</span>
                    <button onclick="rollItem('${id}')" class="roll-btn bg-emerald-600 hover:bg-emerald-500 text-white font-black py-1.5 rounded text-[10px] uppercase tracking-widest border border-emerald-400 transition shadow-sm w-full">Roll</button>
                </div>

                <!-- Delete (10%) -->
                <div class="flex flex-col gap-1 items-center">
                    <span class="opacity-0 text-[8px]">X</span>
                    <button onclick="this.closest('.item-row').remove(); saveItems();" class="text-gray-500 hover:text-red-400 font-bold text-xl leading-none">&times;</button>
                </div>
            </div>
        `;
        container.appendChild(div);
    }

    function saveItems() {
        const items = [];
        document.querySelectorAll('.item-row').forEach(row => {
            items.push({
                name: row.querySelector('.item-name').value,
                mod: parseInt(row.querySelector('.item-mod').value),
                attr: row.querySelector('.item-attr').value
            });
        });
        saveData('active_items', items);
    }

    function rollItem(id) {
        const row = document.querySelector(`[data-id="${id}"]`);
        const itemName = row.querySelector('.item-name').value || "Item";
        const itemMod = parseInt(row.querySelector('.item-mod').value);
        const selectedAttr = row.querySelector('.item-attr').value;
        rollCheck(selectedAttr, itemMod, itemName);
    }

    function rollCheck(attr, itemMod = 0, labelOverride = null) {
        const dp = parseInt(document.getElementById('damagePoints').value) || 0;
        const { penalty: harmPenalty } = calculateHarmStatus(dp);
        if (harmPenalty <= -99) return;

        const attrBonus = parseInt(document.getElementById(`${attr}Bonus`).value) || 0;
        const totalMod = attrBonus + harmPenalty + itemMod;

        const dice = [Math.ceil(Math.random()*6), Math.ceil(Math.random()*6), Math.ceil(Math.random()*6)];
        const sum = dice.reduce((a,b) => a+b, 0);
        const final = sum + totalMod;

        let res = { text: 'Critical Failure', color: 'bg-red-700 text-white', effect: 'Add 2 Doom.' };
        if (final >= 15) res = { text: 'Critical Success', color: 'bg-green-700 text-white', effect: 'Gain 2 Power.' };
        else if (final >= 11) res = { text: 'Full Success', color: 'bg-green-500 text-gray-900', effect: 'Gain 1 Power.' };
        else if (final >= 7) res = { text: 'Mixed Success', color: 'bg-yellow-500 text-gray-900', effect: 'Add 1 Doom.' };

        document.getElementById('checkAttributeName').textContent = labelOverride ? `${labelOverride} (${attr})` : `${attr} Check`;
        document.getElementById('totalBonusDisplay').textContent = (totalMod >= 0 ? '+' : '') + totalMod;
        document.getElementById('diceValues').textContent = dice.join('+');
        document.getElementById('finalTotal').textContent = final;
        
        const outcomeEl = document.getElementById('outcomeText');
        outcomeEl.textContent = res.text;
        outcomeEl.className = `text-xl font-bold rounded px-2 py-1 mt-1 text-center ${res.color}`;
        document.getElementById('outcomeEffect').textContent = res.effect;
        document.getElementById('results').classList.remove('hidden');

        const log = `[${labelOverride || attr}] 3d6${totalMod >= 0 ? '+' : ''}${totalMod} = ${final} (${res.text})`;
        const el = document.createElement('textarea');
        el.value = log;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
    }

    window.onload = () => {
        setupAttributeInputs();
        document.getElementById('charName').value = getData('name', '');
        document.getElementById('charLevel').value = getData('level', 1);
        document.getElementById('notesArea').value = getData('notes', '');
        document.getElementById('equipmentArea').value = getData('equipment', '');
        document.getElementById('damagePoints').value = getData('dp', 0);
        document.getElementById('powerPoints').value = getData('power', 0);
        
        const items = getData('active_items', []);
        if (items.length > 0) items.forEach(item => addItemRow(item));
        else addItemRow({ name: 'Baseball Bat', mod: 1, attr: 'Strength' });

        handleDamagePointsChange();
    };
</script>
</body>
</html>
