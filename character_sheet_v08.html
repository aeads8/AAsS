<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew's Asynchronous System (AAsS) Character Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
        }
        .container {
            max-width: 550px;
        }
        /* Standardizing number input appearance */
        input[type=number] {
            text-align: center;
            padding-right: 8px; /* Offset arrows from the far right edge */
        }
        /* Specific override for inputs where we want to hide arrows entirely (if any) */
        .no-spinners::-webkit-outer-spin-button,
        .no-spinners::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .top-bar-input {
            text-align: center;
        }
        select.text-center-select {
            text-align-last: center;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

<div class="container bg-gray-800 p-6 sm:p-8 rounded-xl shadow-2xl w-full border border-gray-700">
    
    <h1 class="text-3xl font-bold text-indigo-400 mb-6 text-center text-pretty">AAsS Character Sheet</h1>

    <!-- Character Information -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <div class="space-y-3">
            <div class="flex items-center">
                <label for="charName" class="w-1/4 text-gray-300 font-medium">Name:</label>
                <input type="text" id="charName" class="w-3/4 px-3 py-2 bg-gray-600 border border-gray-500 rounded-lg text-white focus:ring-1 focus:ring-indigo-500" oninput="saveData('name', this.value)">
            </div>
            <div class="flex items-center">
                <label for="charLevel" class="w-1/4 text-gray-300 font-medium">Level:</label>
                <input type="number" id="charLevel" value="1" class="w-1/4 px-3 py-2 bg-gray-600 border border-gray-500 rounded-lg text-white text-center" oninput="saveData('level', this.value)">
            </div>
        </div>
    </div>

    <!-- Momentum, Harm, and Global Modifier -->
    <div class="grid grid-cols-3 gap-2 mb-6">
        <!-- Momentum -->
        <div class="bg-gray-700 p-3 rounded-lg border border-gray-600 text-center flex flex-col justify-between">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-tighter">Momentum</h2>
            <input type="number" id="momentumPoints" value="0" min="0" max="10" 
                   class="top-bar-input w-full bg-gray-600 border border-gray-500 rounded text-lg text-white font-bold h-10" 
                   oninput="saveData('momentum', this.value)">
        </div>
        
        <!-- Harm - Damage Points -->
        <div class="bg-gray-700 p-3 rounded-lg border border-gray-600 text-center flex flex-col justify-between">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-tighter">Harm - Damage Points</h2>
            <div class="relative group">
                <!-- Visible Display Overlay -->
                <div id="damageOverlay" class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 font-bold text-lg"></div>
                <!-- Actual Input -->
                <input type="number" id="damagePoints" value="0" min="0" 
                       class="top-bar-input w-full bg-gray-600 border border-gray-500 rounded text-transparent font-bold h-10 text-center focus:text-transparent selection:bg-transparent" 
                       oninput="handleDamageInputChange(this.value)">
            </div>
        </div>
        
        <!-- Global Modifier -->
        <div class="bg-gray-700 p-3 rounded-lg border border-gray-600 text-center flex flex-col justify-between">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-tighter">Global Modifier</h2>
            <input type="number" id="tempBonus" value="0" 
                   class="top-bar-input w-full bg-gray-600 border border-gray-500 rounded text-lg text-white font-bold h-10" 
                   oninput="saveData('temp_bonus', this.value)">
        </div>
    </div>

    <!-- Attributes -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-2">
            <h2 class="text-xl font-semibold text-gray-200">Abilities</h2>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest italic">3d6 + Mods</span>
        </div>
        
        <div class="flex gap-3 mb-2 px-1">
            <div class="w-1/3 text-[10px] font-bold text-gray-500 uppercase">Ability</div>
            <div class="w-1/3 text-[10px] font-bold text-gray-500 uppercase text-center">Score</div>
            <div class="w-1/3 text-[10px] font-bold text-gray-500 uppercase text-center">Action</div>
        </div>

        <div id="attributeInputs" class="space-y-3"></div>
    </div>

    <!-- Active Items -->
    <div class="mb-6 bg-gray-700 p-4 rounded-lg border border-gray-600">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-sm font-bold text-indigo-300 uppercase">Active Items</h2>
            <button onclick="addItemRow()" class="text-[10px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded">+ Add Item</button>
        </div>
        <div id="itemsContainer" class="space-y-2"></div>
    </div>

    <!-- Roll Results -->
    <div id="results" class="mb-6 p-5 bg-gray-900 rounded-xl border-2 border-indigo-500 hidden">
        <div class="text-center mb-1">
            <span id="checkLabel" class="text-indigo-400 font-extrabold text-sm uppercase tracking-widest"></span>
        </div>
        <div class="flex justify-around items-center mb-2">
            <div class="text-center">
                <p class="text-[10px] text-gray-500 uppercase">Mod</p>
                <div id="totalModDisplay" class="text-lg font-bold text-indigo-300"></div>
            </div>
            <div id="finalTotal" class="text-6xl font-black text-white px-4"></div>
            <div class="text-center">
                <p class="text-[10px] text-gray-500 uppercase">Dice</p>
                <div id="diceDisplay" class="text-lg font-mono text-yellow-400 font-bold"></div>
            </div>
        </div>
        <div id="outcomeText" class="text-xl font-bold rounded-lg px-2 py-1 text-center"></div>
        <p id="outcomeEffect" class="text-sm text-gray-300 mt-2 text-center italic"></p>
    </div>

    <!-- Equipment & Notes -->
    <div class="space-y-4">
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
            <h2 class="text-sm font-bold text-gray-400 uppercase mb-2">General Gear</h2>
            <textarea id="equipmentArea" rows="3" class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-lg text-sm text-white" oninput="saveData('equipment', this.value)"></textarea>
        </div>
        <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
            <h2 class="text-sm font-bold text-gray-400 uppercase mb-2">Notes</h2>
            <textarea id="notesArea" rows="3" class="w-full px-3 py-2 bg-gray-600 border border-gray-500 rounded-lg text-sm text-white" oninput="saveData('notes', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    const ATTRIBUTES = ['Strength', 'Dexterity', 'Wit', 'Soul'];
    const STORAGE_KEY_PREFIX = 'AAsS_v3_';

    const saveData = (key, val) => localStorage.setItem(`${STORAGE_KEY_PREFIX}${key}`, typeof val === 'object' ? JSON.stringify(val) : val);
    const getData = (key, def) => {
        const v = localStorage.getItem(`${STORAGE_KEY_PREFIX}${key}`);
        if (v === null) return def;
        try { return JSON.parse(v); } catch(e) { return v; }
    };

    function setupAttributeInputs() {
        const container = document.getElementById('attributeInputs');
        ATTRIBUTES.forEach(attr => {
            const row = document.createElement('div');
            row.className = "flex items-center gap-3";
            row.innerHTML = `
                <div class="w-1/3 text-gray-300 font-bold uppercase text-xs tracking-wide">${attr}</div>
                <div class="w-1/3">
                    <input type="number" id="bonus_${attr}" value="${getData('bonus_'+attr, 0)}" 
                        class="w-full px-2 py-2 bg-gray-600 border border-gray-500 rounded-lg text-white font-bold text-center" 
                        oninput="saveData('bonus_${attr}', this.value)">
                </div>
                <div class="w-1/3">
                    <button onclick="roll('${attr}')" class="roll-btn w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-2 rounded-lg text-xs uppercase transition active:scale-95 shadow-md">Roll</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function addItemRow(data = { name: '', mod: 0, attr: 'Strength' }) {
        const div = document.createElement('div');
        div.className = "item-row flex gap-2 items-center bg-gray-600/50 p-2 rounded-md border border-gray-600";
        div.innerHTML = `
            <input type="text" placeholder="Item" value="${data.name}" 
                   class="item-name w-[40%] bg-gray-600 border-none rounded px-2 py-1 text-xs text-white" 
                   oninput="saveItems()">
            <input type="number" value="${data.mod}" 
                   class="item-mod w-[15%] bg-gray-600 border-none rounded px-1 py-1 text-xs text-center text-white" 
                   oninput="saveItems()">
            <select class="item-attr text-center-select w-[15%] bg-gray-600 border-none rounded px-1 py-1 text-[10px] text-white text-center" 
                    onchange="saveItems()">
                ${ATTRIBUTES.map(a => `<option value="${a}" ${data.attr === a ? 'selected' : ''}>${a}</option>`).join('')}
            </select>
            <button onclick="rollFromItem(this)" 
                    class="w-[30%] bg-indigo-500 hover:bg-indigo-400 text-white p-1 rounded text-[10px] font-bold uppercase truncate">Roll</button>
            <button onclick="this.parentElement.remove(); saveItems();" class="text-red-400 hover:text-red-300 font-bold px-1">×</button>
        `;
        document.getElementById('itemsContainer').appendChild(div);
    }

    function saveItems() {
        const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
            name: row.querySelector('.item-name').value,
            mod: parseInt(row.querySelector('.item-mod').value) || 0,
            attr: row.querySelector('.item-attr').value
        }));
        saveData('active_items', items);
    }

    let currentDamage = 0;
    function handleDamageInputChange(val) {
        currentDamage = Math.max(0, parseInt(val) || 0);
        updateDamageDisplay();
    }

    function updateDamageDisplay() {
        saveData('dp', currentDamage);
        let status = 'Healthy', colorClass = 'text-green-400', borderColor = 'border-gray-500';
        
        if (currentDamage >= 6) { status = 'Broken'; colorClass = 'text-red-500'; borderColor = 'border-red-700'; }
        else if (currentDamage >= 4) { status = 'Injured'; colorClass = 'text-red-400'; borderColor = 'border-red-500'; }
        else if (currentDamage >= 2) { status = 'Bruised'; colorClass = 'text-orange-400'; borderColor = 'border-orange-500'; }
        
        const inputEl = document.getElementById('damagePoints');
        const overlayEl = document.getElementById('damageOverlay');
        
        inputEl.value = currentDamage;
        inputEl.className = `top-bar-input w-full bg-gray-600 border rounded text-transparent font-bold h-10 text-center focus:text-transparent selection:bg-transparent ${borderColor}`;
        
        overlayEl.textContent = `${currentDamage} - ${status}`;
        overlayEl.className = `absolute inset-0 flex items-center justify-center pointer-events-none z-10 font-bold text-lg ${colorClass}`;
        
        document.querySelectorAll('.roll-btn').forEach(b => b.disabled = currentDamage >= 6);
    }

    function rollFromItem(btn) {
        const row = btn.parentElement;
        const name = row.querySelector('.item-name').value;
        const mod = parseInt(row.querySelector('.item-mod').value) || 0;
        const attr = row.querySelector('.item-attr').value;
        roll(attr, mod, name);
    }

    function roll(attr, itemMod = 0, labelOverride = null) {
        const dp = currentDamage;
        let harmPenalty = 0;
        if (dp >= 6) return;
        if (dp >= 4) harmPenalty = -2;
        else if (dp >= 2) harmPenalty = -1;

        const attrBonus = parseInt(document.getElementById(`bonus_${attr}`).value) || 0;
        const tempMod = parseInt(document.getElementById('tempBonus').value) || 0;
        const totalMod = attrBonus + harmPenalty + tempMod + itemMod;

        const d = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
        const sum = d.reduce((a, b) => a + b, 0);
        const final = sum + totalMod;

        let res = { text: 'Critical Failure', color: 'bg-red-700 text-white', effect: 'Disaster! GM gains 2 Tension.' };
        if (final >= 15) res = { text: 'Critical Success', color: 'bg-indigo-600 text-white', effect: 'Perfect! Gain 2 Momentum.' };
        else if (final >= 11) res = { text: 'Full Success', color: 'bg-emerald-500 text-gray-900', effect: 'You do it. Gain 1 Momentum.' };
        else if (final >= 7) res = { text: 'Mixed Success', color: 'bg-amber-500 text-gray-900', effect: 'Success, but at a cost. GM gains 1 Tension.' };

        document.getElementById('checkLabel').textContent = labelOverride ? `${labelOverride} (${attr})` : `${attr} Check`;
        document.getElementById('totalModDisplay').textContent = (totalMod >= 0 ? '+' : '') + totalMod;
        document.getElementById('diceDisplay').textContent = d.join('+');
        document.getElementById('finalTotal').textContent = final;
        
        const outcomeEl = document.getElementById('outcomeText');
        outcomeEl.textContent = res.text;
        outcomeEl.className = `text-xl font-bold rounded-lg px-2 py-1 mt-1 text-center ${res.color}`;
        document.getElementById('outcomeEffect').textContent = res.effect;
        document.getElementById('results').classList.remove('hidden');

        const log = `[${labelOverride || attr}] 3d6${totalMod >= 0 ? '+' : ''}${totalMod} = ${final} (${res.text})`;
        const el = document.createElement('textarea');
        el.value = log;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
    }

    window.onload = () => {
        setupAttributeInputs();
        document.getElementById('charName').value = getData('name', '');
        document.getElementById('charLevel').value = getData('level', 1);
        document.getElementById('notesArea').value = getData('notes', '');
        document.getElementById('equipmentArea').value = getData('equipment', '');
        currentDamage = parseInt(getData('dp', 0));
        document.getElementById('momentumPoints').value = getData('momentum', 0);
        document.getElementById('tempBonus').value = getData('temp_bonus', 0);
        
        const items = getData('active_items', []);
        if (items.length > 0) items.forEach(item => addItemRow(item));
        else addItemRow({ name: 'Baseball Bat [example]', mod: 1, attr: 'Strength' });

        updateDamageDisplay();
    };
</script>

</body>
</html>
